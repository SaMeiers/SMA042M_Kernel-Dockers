name: Kernel Compilation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up build environment
      run: |
        sudo apt update -y
        sudo apt install -y libncurses5-dev build-essential bc flex bison libssl-dev

    - name: Download clang-r383902
      run: |
        git clone --depth=1 --filter=blob:none --sparse \
          https://github.com/crdroidandroid/android_prebuilts_clang_host_linux-x86 clang-tmp
        cd clang-tmp
        git sparse-checkout set clang-r383902
        cd ..
        mkdir -p toolchains
        mv clang-tmp/clang-r383902 toolchains/clang-r383902
        rm -rf clang-tmp
        chmod +x toolchains/clang-r383902/bin/*

    - name: Download GCC 4.9 aarch64 toolchain
      run: |
        git clone --depth=1 -b lineage-19.1 \
          https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
          toolchains/aarch64-linux-android-4.9
        chmod +x toolchains/aarch64-linux-android-4.9/bin/*

    - name: Place custom.config
      run: |
        cp custom.config arch/arm64/configs/custom.config

    - name: Compile Kernel
      run: |
        chmod +x build_kernel.sh
        bash build_kernel.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SM-A042M-Magisk-${{ github.event.inputs.tag }}
        path: build/*.tar

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.tag }}
        name: "SM-A042M-Magisk-${{ github.event.inputs.tag }}"
        draft: false
        prerelease: false
        token: ${{ secrets.TOKEN }}
        artifacts: "build/*.tar"
        body: "Commit SHA: ${{ github.sha }}"
